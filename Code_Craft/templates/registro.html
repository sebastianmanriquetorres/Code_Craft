<!DOCTYPE html>
<html lang="es-PE">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../templates/css/style.css" />
  <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <title>Code_Craft Registro</title>
</head>
<body>

  <!-- Figuras animadas de fondo -->
  <div class="fondo-animado">
    <span style="left: 10%; animation-delay: 0s;"></span>
    <span style="left: 25%; animation-delay: 5s;"></span>
    <span style="left: 40%; animation-delay: 10s;"></span>
    <span style="left: 55%; animation-delay: 15s;"></span>
    <span style="left: 70%; animation-delay: 20s;"></span>
    <span style="left: 85%; animation-delay: 36s;"></span>
  </div>

  <!-- Formulario de registro -->
  <form method="POST">
    <fieldset>
      <legend>Regístrate en Code_Craft</legend>

      <!-- Campo: Nombre -->
      <label for="nombre">
        <lord-icon
          src="https://cdn.lordicon.com/bgebyztw.json"
          trigger="loop"
          delay="2000"
          colors="primary:#007bff,secondary:#4030e8"
          style="width:22px;height:22px;margin-bottom:-6px;">
        </lord-icon>
        <span class="label-text">Nombre</span>
      </label>
      <input id="nombre" type="text" placeholder="Tu nombre" name="nombre" required />

      <!-- Campo: Apellido -->
      <label for="apellido">
        <lord-icon
          src="https://cdn.lordicon.com/bgebyztw.json"
          trigger="loop"
          delay="2000"
          colors="primary:#007bff,secondary:#4030e8"
          style="width:22px;height:22px;margin-bottom:-6px;">
        </lord-icon>
        <span class="label-text">Apellido</span>
      </label>
      <input id="apellido" type="text" placeholder="Tu apellido" name="apellido" required />

      <!-- Campo: Correo -->
      <label for="correo">
        <lord-icon
          src="https://cdn.lordicon.com/vpbspaec.json"
          trigger="loop"
          delay="20"
          colors="primary:#3080e8,secondary:#242424"
          style="width:22px;height:22px">
        </lord-icon>
        <span class="label-text">Correo</span>
      </label>
      <input id="correo" type="email" placeholder="Correo electrónico" name="correo" required />

      <!-- Campo: Teléfono -->
      <label for="telefono">
        <lord-icon
          src="https://cdn.lordicon.com/jezazvlx.json"
          trigger="loop"
          delay="20"
          colors="primary:#3080e8,secondary:#242424"
          style="width:22px;height:22px">
        </lord-icon>
        <span class="label-text">Teléfono</span>
      </label>
      <input id="telefono" type="tel" placeholder="Número de teléfono" name="Telefono" required />

      <!-- Campo: Rol -->
      <label for="tipo_cuenta">
        <lord-icon
          src="https://cdn.lordicon.com/oezixobx.json"
          trigger="loop"
          delay="20"
          colors="primary:#007bff,secondary:#242424"
          style="width:22px;height:22px">
        </lord-icon>
        <span class="label-text">Rol</span>
      </label>
      <select id="tipo_cuenta" name="tipo_cuenta" required>
        <option value="">Selecciona una opción</option>
        <option value="cliente">Cliente</option>
        <option value="desarrollador">Desarrollador</option>
      </select>

      <!-- Campo adicional SOLO para Desarrollador -->
      <div id="extra_desarrollador" style="display:none;">
        <label for="Cargo">
          <lord-icon
            src="https://cdn.lordicon.com/wloilxuq.json"
            trigger="loop"
            delay="20"
            colors="primary:#007bff,secondary:#242424"
            style="width:22px;height:22px">
          </lord-icon>
          <span class="label-text">Cargo</span>
        </label>
        <input id="Cargo" type="text" placeholder="Ej: Backend, UI/UX" name="Cargo" />
      </div>

      <!-- Campo: Contraseña -->
      <label for="contrasena">
        <lord-icon
          src="https://cdn.lordicon.com/mqgegihh.json"
          trigger="loop"
          delay="20"
          colors="primary:#242424,secondary:#007bff"
          style="width:22px;height:22px">
        </lord-icon>
        <span class="label-text">Contraseña</span>
        <span class="tooltip">
          <span class="tooltip-text">⚠️ La contraseña debe tener más de 6 caracteres</span>
        </span>
      </label>
      <input id="contrasena" name="contrasena" type="password" placeholder="password" required />

      <!-- Botón de envío -->
      <input class="enviar" value="Registrarse" type="submit" />

      <!-- Botón: ir a login -->
      <div class="extra-buttons">
        <button type="button" class="btn-link">
          ¿Ya tienes una cuenta? Inicia sesión aquí
        </button>
      </div>
    </fieldset>
  </form>

  <!-- Script para mostrar/ocultar campo -->
  <script>
    const tipoCuenta = document.getElementById("tipo_cuenta");
    const extraDev = document.getElementById("extra_desarrollador");

    tipoCuenta.addEventListener("change", function () {
      if (this.value === "desarrollador") {
        extraDev.style.display = "block";
      } else {
        extraDev.style.display = "none";
      }
    });
  </script>

  <!-- Estilos internos mínimos (no cambian tu estilo original) -->
  <style>
    .label-text {
      font-size: 0.98rem;
      font-weight: 500;
      margin-left: 4px;
      color: #ffa552;
      letter-spacing: 0.01em;
    }
    @media (max-width: 500px) {
      .label-text { font-size: 0.93rem; }
    }
    select, input[type="text"], input[type="email"], input[type="password"], input[type="tel"] {
      width: 100%;
      padding: 10px;
      margin: 6px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .extra-buttons { text-align: center; margin-top: 12px; }
    .btn-link {
      background: none; border: none; color: #007bff;
      font-size: 0.95rem; cursor: pointer; text-decoration: underline;
    }
    .btn-link:hover { color: #0056b3; }
  </style>
</body>
</html>
