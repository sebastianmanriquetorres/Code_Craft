<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCraft</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .navbar {
      padding-top: 1rem;
      padding-bottom: 1rem;
      font-size: 1.1rem;
    }
    .navbar-brand img {
      margin-right: 8px;
    }
    .navbar .btn {
      font-size: 1rem;
      padding: 0.6rem 1.2rem;
    }
    /* Centrar logo */
    .navbar-brand {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark position-relative">
    <div class="container-fluid">

      <!-- Menú (izquierda) -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Plantillas</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
        </ul>

        <!-- Botones (izquierda, junto al menú) -->
        <div class="d-flex me-3">
          <button class="btn btn-outline-light me-2">Iniciar Sesión</button>
          <button class="btn btn-warning">Registrarse</button>
        </div>
      </div>

      <!-- Logo (centrado absoluto) -->
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="logo.png" alt="Logo" width="40" class="d-inline-block align-text-top">
        CodeCraft
      </a>

      <!-- Buscador (derecha) -->
      <form class="d-flex ms-auto">
        <input class="form-control me-2" type="search" placeholder="Buscar Plantilla">
        <button class="btn btn-outline-light" type="submit">🔍</button>
      </form>
    </div>
  </nav>

  <!-- CAROUSEL -->
  <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://picsum.photos/1200/400?random=1" class="d-block w-100" alt="Imagen 1">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/1200/400?random=2" class="d-block w-100" alt="Imagen 2">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/1200/400?random=3" class="d-block w-100" alt="Imagen 3">
      </div>
    </div>

    <!-- Botones del carousel -->
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
